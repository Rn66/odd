name: Auto Register opendoor.cn

on:
  workflow_dispatch:
  schedule:
    # 每 10 分钟运行一次
    - cron: '*/10 * * * *'

# 防止上一次任务没结束，下一次又同时运行
concurrency:
  group: auto-register-opendoor
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  register:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Check system before install
        run: |
          echo "===== System ====="
          uname -a

          echo "===== Python ====="
          python --version
          which python

          echo "===== Existing Chrome ====="
          google-chrome --version || true
          chromium-browser --version || true

      - name: Install Chrome
        run: |
          sudo apt-get update

          sudo apt-get install -y wget gnupg ca-certificates

          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | \
            sudo gpg --dearmor -o /usr/share/keyrings/google-linux-signing-keyring.gpg

          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-linux-signing-keyring.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | \
            sudo tee /etc/apt/sources.list.d/google-chrome.list

          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Xvfb and required system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            fonts-liberation \
            libnss3 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libx11-xcb1 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libasound2t64 \
            libpangocairo-1.0-0 \
            libgtk-3-0

      - name: Check Chrome after install
        run: |
          echo "===== Chrome Version ====="
          google-chrome --version
          which google-chrome

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install requests selenium undetected-chromedriver

      - name: Clear undetected-chromedriver cache
        run: |
          echo "清理 undetected_chromedriver 缓存..."
          rm -rf ~/.local/share/undetected_chromedriver || true
          rm -rf ~/.cache/selenium || true

          echo "检查缓存目录："
          ls -la ~/.local/share || true
          ls -la ~/.cache || true

      - name: Run register script with Xvfb
        timeout-minutes: 8
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python register.py 2>&1
        env:
          USE_XVFB: "true"

      - name: Find debug files
        if: always()
        run: |
          echo "===== 当前目录 ====="
          pwd

          echo "===== 文件列表 ====="
          ls -la

          echo "===== 查找 PNG 截图 ====="
          find . -name "*.png" -type f || true

          echo "===== 查找日志文件 ====="
          find . \( -name "*.log" -o -name "*.txt" \) -type f || true

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: debug-screenshots
          path: "**/*.png"
          if-no-files-found: ignore

      - name: Upload debug logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: debug-logs
          path: |
            **/*.log
            **/*.txt
          if-no-files-found: ignore
